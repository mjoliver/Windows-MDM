# ─────────────────────────────────────────────────────────────────────────────
# Latchz MDM  —  Example Configuration
#
# Copy this file to latchz.yaml and edit to suit your environment.
# All values can be overridden with environment variables:
#   latchz.yaml key         →   env var
#   server.domain         →   LATCHZ_SERVER_DOMAIN
#   database.dsn          →   LATCHZ_DATABASE_DSN
#   tls.mode              →   LATCHZ_TLS_MODE
#   auth.oidc.client_id   →   LATCHZ_AUTH_OIDC_CLIENT_ID
#   (and so on for all keys — dots become underscores, LATCHZ_ prefix)
# ─────────────────────────────────────────────────────────────────────────────

server:
  # Public hostname of your MDM server. Must match the DNS name used for enrollment.
  domain: mdm.example.com

  # Network address to bind. Defaults to :8443 for TLS modes, :8080 for none.
  listen: ":443"

  # The email domain your users enroll with.
  # Windows will look for MDM at: enterpriseenrollment.<enrollment_domain>
  enrollment_domain: example.com

  # Emergency access token. If you're locked out of the dashboard, hit:
  #   https://<domain>/emergency?token=<this_value>
  # Rotate this immediately after use. Keep it secret.
  emergency_token: "change-me-to-a-random-string"

  # REQUIRED. Encrypts the Root CA private key at rest (argon2id-derived key).
  # Use a high-entropy random value of at least 16 characters; prefer supplying
  # it via the LATCHZ_SERVER_MASTER_SECRET env var / a secret manager rather
  # than committing it. Losing or changing it invalidates the stored CA.
  master_secret: "CHANGE-ME-use-a-long-random-value"

# ─── TLS ────────────────────────────────────────────────────────────────────

tls:
  # TLS mode — one of:
  #   "auto"        Let's Encrypt. Pane manages cert renewal automatically.
  #                 Requires port 80 open to the internet for ACME HTTP-01.
  #   "manual"      Provide your own cert and key files.
  #   "self-signed" Auto-generated cert. For local dev only.
  #   "none"        No TLS. Use when behind a proxy (Cloud Run, nginx, Caddy).
  mode: auto

  # cache_dir is where Let's Encrypt certificates are stored (mode=auto only).
  cache_dir: /var/lib/latchz/certs

  # For mode=manual only:
  # cert_file: /etc/ssl/pane/fullchain.pem
  # key_file:  /etc/ssl/pane/privkey.pem

  # Device (OMA-DM) authentication requires a client certificate. With mode=auto
  # / manual / self-signed the server requests it directly over mTLS. With
  # mode=none (TLS terminated by a proxy/load balancer), enable the following so
  # devices can be authenticated via a client cert the proxy forwards. ONLY turn
  # this on if the proxy does mTLS and OVERWRITES this header (never trust a
  # client-supplied value).
  # trust_proxy_client_cert: true
  # client_cert_header: "X-Forwarded-Client-Cert"   # e.g. nginx $ssl_client_escaped_cert

# ─── Database ────────────────────────────────────────────────────────────────

database:
  # driver: "sqlite" (default) or "postgres"
  driver: sqlite

  # SQLite: path to the database file
  dsn: /var/lib/latchz/latchz.db

  # PostgreSQL example:
  # driver: postgres
  # dsn: "postgres://latchz:password@localhost:5432/pane?sslmode=require"

# ─── Authentication ──────────────────────────────────────────────────────────

auth:
  # provider: "oidc" (Google Workspace, Okta, Entra ID, etc.) or "builtin"
  # (local username/password). An unset/unknown provider is rejected — the
  # server refuses to start without real authentication.
  provider: oidc

  # REQUIRED in production. Stable, high-entropy (>=32 char) secret that signs
  # dashboard session + enrollment JWTs. If unset, a random per-process secret
  # is generated, which invalidates sessions on restart and breaks multi-instance
  # deployments. Prefer the LATCHZ_AUTH_JWT_SECRET env var.
  jwt_secret: "CHANGE-ME-use-a-long-random-32-byte-value"

  # Email granted super_admin when first created. This is the ONLY way an account
  # becomes admin automatically (there is no "first login becomes admin"). Other
  # users are created as 'user'; promote them with: latchz admin -email <addr>.
  bootstrap_admin: "you@example.com"

  oidc:
    # Google Workspace example:
    #   Issuer: https://accounts.google.com
    #   Create an OAuth 2.0 Client ID at: https://console.cloud.google.com/apis/credentials
    #   Redirect URI: https://<domain>/auth/callback
    issuer: https://accounts.google.com
    client_id: "your-client-id.apps.googleusercontent.com"
    client_secret: "your-client-secret"

    # REQUIRED for oidc: restrict login to these email domains. Must list at
    # least one — an empty list would let ANY account at the IdP (e.g. any
    # Google account) sign in to your dashboard.
    allowed_domains:
      - example.com
